version: "3.9"

services:
  backend:
    build: ./backend
    container_name: agrimart_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - agrimart_db:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/agrimart.db
      - SECRET_KEY=change-this-secret-in-production
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://frontend:3000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: agrimart_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  agrimart_db:
